<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="css/image/mura_favicon.png" type="image/x-icon">
    <title>Iniciar Sesión | Mura</title>
</head>
<body class="auth-page">

    <a href="index.html" class="back-link">← Volver a Mura</a>

    <main class="container auth-box">
        <h1>Bienvenido de nuevo</h1>
        <p>Ingresa a tu cuenta Mura.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="user_name" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password_hash" required>
            </div>
            <button type="button" id="btnLogin" class="btn btn-primary">Entrar</button>
        </form>
        
        <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </main>
    <script src="js/mura.js"></script>

</body>
</html>
