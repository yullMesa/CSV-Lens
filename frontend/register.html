<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css"> <!-- Asegúrate de que la ruta sea correcta -->
    <title>Registro | Mura</title>
</head>
<body class="auth-page"> <!-- Clase especial para centrar el formulario -->

    <main class="container auth-box">
        <h1>Únete a Mura</h1>
        <p>Crea tu cuenta para comenzar.</p>

        <form action="/registro" method="POST">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
        
        <p class="auth-link">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
    </main>

</body>
</html>
