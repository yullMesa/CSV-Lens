<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Style.css">
    <title>Mura - Plataforma de Aprendizaje</title>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <nav>
                <!-- Agregamos la clase 'menu-lateral' aquí -->
                <ul class="menu-lateral">
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Comunidad</a></li>
                    <li><a href="#">Mis Rutas</a></li>
                    <li><a href="#">Mi progreso</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <section class="intro">
                <h1>¿Qué deseas aprender hoy?</h1>
                <p>Selecciona una ruta para comenzar tu transformación:</p>
            </section>

            <ul class="cards-container">
                <li class="card">
                    <img src="css/image/theme/finanza.png" alt="Finanzas">
                    <h3>Finanzas</h3>
                    <button>Empezar</button>
                </li>
                <li class="card">
                    <img src="css/image/theme/nurse.png" alt="Salud">
                    <h3>Salud</h3>
                    <button>Empezar</button>
                </li>
                    <li class="card">
                    <img src="css/image/theme/habitos.png" alt="Hábitos">
                    <h3>Hábitos</h3>
                    <button>Empezar</button>
                </li>
            </ul>
        </main>
    </div>

</html>
